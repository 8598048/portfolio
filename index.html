<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sam Suther — Cybersecurity & CS</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(135deg, rgba(58,191,110,0.04) 25%, transparent 25%),
        linear-gradient(225deg, rgba(58,191,110,0.04) 25%, transparent 25%),
        linear-gradient(315deg, rgba(58,191,110,0.04) 25%, transparent 25%),
        linear-gradient(45deg, rgba(58,191,110,0.04) 25%, transparent 25%);
      background-size: 40px 40px;
    }
    .hero-glow {
      position: absolute; width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,80,53,0.18) 0%, transparent 65%);
      top: 50%; left: 35%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .hero-content { position: relative; max-width: 900px; }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--accent2);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }
    .hero-tag::before {
      content: '';
      display: inline-block;
      width: 28px; height: 2px;
      background: var(--accent2);
    }
    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    h1 .dim { color: var(--muted); }
    h1 .accent { color: var(--accent); }
    .hero-sub {
      margin-top: 1.8rem;
      font-size: 1rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.75;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .hero-cta { margin-top: 2.5rem; display: flex; gap: 1rem; flex-wrap: wrap; animation: fadeUp 0.6s 0.3s ease both; }
    @media (max-width: 768px) {
      #hero { padding: 0 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Sam Suther <span>// UNCC</span></a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="experience.html">Experience</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-glow"></div>
    <div class="hero-content">
      <div class="hero-tag">Seeking Early Career Roles in Cybersecurity</div>
      <h1>Sam<br><span class="dim">Suther</span><span class="accent">.</span></h1>
      <p class="hero-sub">CS senior at UNC Charlotte focused on cybersecurity. Building things, breaking things, and learning from both.</p>
      <div class="hero-cta">
        <a href="projects.html" class="btn btn-primary">View Projects</a>
        <a href="Samuel%20Suther%20Resume%202-11-26.pdf" download target="_blank" class="btn btn-ghost">Download Resume</a>
      </div>
    </div>
  </section>

  <footer>
    Built by Sam Suther, <span id="year"></span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
